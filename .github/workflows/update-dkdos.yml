name: Update DKDOS status

on:
  schedule:
    - cron: "*/59 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/update-dkdos.yml"

permissions:
  contents: write

concurrency:
  group: dkdos-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Read GitHub profile status
        run: node scripts/update-github-status.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USER: DanKaufmanDev

      - name: Regenerate DKDOS
        run: node scripts/generate-dkdos-svg.js

      - name: Commit status change
        run: |
          if ! git diff --quiet -- README.md assets/dkdos.svg data/status.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md assets/dkdos.svg data/status.json
            git commit -m "chore: update DKDOS status"
            git push
          fi
