<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="620" viewBox="0 0 1000 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DKDOS - Dan Kaufman Dev Operating System</title>
  <desc id="desc">Interactive retro terminal profile with clickable commands.</desc>
  <defs><filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7cff6b" opacity="0.06"/>
  </pattern>
  <style>
    .mono, text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 0; }
    .terminal { fill: #020403; stroke: #1d8f4d; stroke-width: 2; }
    .titlebar { fill: #06150c; stroke: #1d8f4d; stroke-width: 1; }
    .panel { fill: #010201; stroke: #124f2e; stroke-width: 1; }
    .brand { fill: #7cff6b; font-size: 18px; font-weight: 700; filter: url(#glow); }
    .title { fill: #aaff9d; font-size: 17px; }
    .text { fill: #b7ffad; font-size: 18px; }
    .small { fill: #8fe883; font-size: 14px; }
    .muted { fill: #5da865; font-size: 15px; }
    .dim { fill: #356c41; font-size: 14px; }
    .prompt { fill: #7cff6b; font-size: 18px; filter: url(#glow); }
    .cmd-text { fill: #b7ffad; font-size: 18px; }
    .nav { fill: #7cff6b; font-size: 16px; text-decoration: underline; }
    .hit { fill: #082514; stroke: #1d8f4d; stroke-width: 1; opacity: 0.82; }
    .hidden-hit { opacity: 0.01; stroke: transparent; }
    .cmd:hover .hit { fill: #113d22; stroke: #7cff6b; opacity: 1; }
    .cmd:hover .cmd-text { fill: #ffffff; }
    .bar-bg { fill: #051108; stroke: #1d8f4d; stroke-width: 1; }
    .bar-fill { fill: #7cff6b; filter: url(#glow); }
    .status { fill: #7cff6b; animation: pulse 1.4s ease-in-out infinite; filter: url(#glow); }
    .cursor { fill: #7cff6b; animation: blink 1s steps(2, start) infinite; }
    .boot { animation: boot 0.45s ease; }
    .scan { animation: scan 5s linear infinite; }
    .rain { fill: #7cff6b; font-size: 13px; opacity: 0.42; animation: rain 3.2s linear infinite; }
    @keyframes boot { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    @keyframes scan { from { transform: translateY(-80px); } to { transform: translateY(640px); } }
    @keyframes rain { from { transform: translateY(-80px); } to { transform: translateY(620px); } }
  </style></defs>
  <rect width="1000" height="620" fill="#000"/>
  <rect width="1000" height="620" fill="url(#scanlines)"/>
  <rect class="scan" x="0" y="0" width="1000" height="80" fill="#7cff6b" opacity="0.035"/>
  <rect x="24" y="24" width="952" height="572" rx="8" class="terminal"/>
  <rect x="24" y="24" width="952" height="44" rx="8" class="titlebar"/>
  <circle cx="52" cy="46" r="6" fill="#173f2a"/>
  <circle cx="74" cy="46" r="6" fill="#2f5f33"/>
  <circle cx="96" cy="46" r="6" fill="#7cff6b"/>
  <text x="124" y="52" class="brand" >DKDOS</text>
  <text x="512" y="52" class="title" text-anchor="middle">Dan Kaufman Dev Operating System</text>
  <rect x="50" y="88" width="900" height="476" rx="4" class="panel"/>
  <g><text x="80" y="130" class="text" >Initializing Kernel...</text></g>
<g class="boot" style="animation-delay:0.42s"><text x="80" y="156" class="text" >Loading Projects...</text></g>
<g class="boot" style="animation-delay:0.84s"><text x="80" y="182" class="text" >Loading Open Source...</text></g>
<g class="boot" style="animation-delay:1.26s"><text x="80" y="208" class="text" >Loading Experiments...</text></g>
<g class="boot" style="animation-delay:1.68s"><text x="80" y="234" class="text" >Loading Developer Tools...</text></g>
<g class="boot" style="animation-delay:2.10s"><text x="80" y="260" class="text" >Loading Terminal...</text></g>
<g class="boot" style="animation-delay:2.52s"><text x="80" y="286" class="prompt" >System Ready.</text></g>
  <g class="boot" style="animation-delay:3.25s">
    <text x="540" y="130" class="brand" >DKDOS v1.0</text>
    <text x="540" y="170" class="small" >User: Dan Kaufman</text>
    <circle cx="606" cy="198" r="6" class="status"/>
    <text x="540" y="204" class="small" >Status: ONLINE</text>
    <text x="540" y="238" class="small" >Role: Developer</text>
    <text x="540" y="272" class="small" >Focus: Building Developer ...</text>
    <text x="540" y="306" class="small" >Repos: 0</text>
    <text x="540" y="332" class="small" >Contributions: 0</text>
    <text x="540" y="358" class="small" >Latest: Waiting for GitHub ...</text>
  </g>
  <g class="boot" style="animation-delay:3.65s">
    <text x="80" y="392" class="prompt" >C:\\DKDOS&gt; dir /commands</text>
    <a href="../screens/projects.svg" target="_top" aria-label="Open projects"><g class="cmd">
      <rect x="80" y="414" width="190" height="32" rx="3" class="hit"/>
      <text x="92" y="438" class="cmd-text" >&gt; projects</text>
    </g></a>
<a href="../screens/opensource.svg" target="_top" aria-label="Open opensource"><g class="cmd">
      <rect x="280" y="414" width="190" height="32" rx="3" class="hit"/>
      <text x="292" y="438" class="cmd-text" >&gt; opensource</text>
    </g></a>
<a href="../screens/experiments.svg" target="_top" aria-label="Open experiments"><g class="cmd">
      <rect x="510" y="414" width="190" height="32" rx="3" class="hit"/>
      <text x="522" y="438" class="cmd-text" >&gt; experiments</text>
    </g></a>
<a href="../screens/resume.svg" target="_top" aria-label="Open resume"><g class="cmd">
      <rect x="80" y="462" width="190" height="32" rx="3" class="hit"/>
      <text x="92" y="486" class="cmd-text" >&gt; resume</text>
    </g></a>
<a href="../screens/contact.svg" target="_top" aria-label="Open contact"><g class="cmd">
      <rect x="280" y="462" width="190" height="32" rx="3" class="hit"/>
      <text x="292" y="486" class="cmd-text" >&gt; contact</text>
    </g></a>
    <text x="80" y="540" class="dim" >Tip: try hidden commands: help, sudo, coffee, matrix</text>
    <rect class="cursor" x="420" y="376" width="10" height="20"/>
  </g>
  <a href="../screens/help.svg" target="_top" aria-label="Open help"><g class="cmd">
      <rect x="510" y="462" width="150" height="32" rx="3" class="hit hidden-hit"/>
      
    </g></a>
<a href="../screens/sudo.svg" target="_top" aria-label="Open sudo"><g class="cmd">
      <rect x="670" y="462" width="130" height="32" rx="3" class="hit hidden-hit"/>
      
    </g></a>
<a href="../screens/coffee.svg" target="_top" aria-label="Open coffee"><g class="cmd">
      <rect x="810" y="462" width="130" height="32" rx="3" class="hit hidden-hit"/>
      
    </g></a>
<a href="../screens/matrix.svg" target="_top" aria-label="Open matrix"><g class="cmd">
      <rect x="810" y="414" width="130" height="32" rx="3" class="hit hidden-hit"/>
      
    </g></a>
</svg>